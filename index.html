<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Cat and Mouse Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0f7fa;
        }
        .cat {
            position: absolute;
            width: 100px;
            height: 100px;
            background-image: url('cat.png');
            background-size: cover;
            transition: transform 0.1s;
        }
        .paw {
            position: absolute;
            width: 30px;
            height: 30px;
            background-image: url('paw-print.png');
            background-size: cover;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="cat" id="cat"></div>
    <audio id="catSound" src="cat-sound.mp3" preload="auto"></audio>
    <script>
        const cat = document.getElementById('cat');
        const catSound = document.getElementById('catSound');
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = event.clientX;
            mouseY = event.clientY;
            cat.style.transform = `translate(${mouseX - 50}px, ${mouseY - 50}px)`;
        });

        setInterval(() => {
            const randX = Math.random() * window.innerWidth;
            const randY = Math.random() * window.innerHeight;
            cat.style.transform = `translate(${randX}px, ${randY}px)`;
            catSound.play();
        }, 2000);

        function createPawPrint(x, y) {
            const paw = document.createElement('div');
            paw.classList.add('paw');
            paw.style.left = x + 'px';
            paw.style.top = y + 'px';
            document.body.appendChild(paw);
            setTimeout(() => paw.remove(), 3000);
        }

        document.addEventListener('click', (event) => {
            createPawPrint(event.clientX, event.clientY);
        });
    </script>
</body>
</html>
