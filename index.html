<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat and Mouse Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            position: relative;
            height: 100vh;
        }
        #mouse {
            position: absolute;
            font-size: 50px;
            pointer-events: none;
        }
        .cat {
            position: absolute;
            width: 100px;
            transition: transform 0.15s;
        }
        .paw {
            position: absolute;
            background: rgba(255, 192, 203, 0.7);
            border-radius: 50%;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="mouse">🐭</div>
    <img src="orange_cat.png" class="cat" id="cat1" style="left: 50px; top: 50px;">
    <img src="orange_spotted_cat.png" class="cat" id="cat2" style="left: 150px; top: 50px;">
    <img src="grey_spotted_cat.png" class="cat" id="cat3" style="left: 250px; top: 50px;">

    <script>
        const mouse = document.getElementById('mouse');
        const cats = document.querySelectorAll('.cat');
        const pawPrints = [];

        document.addEventListener('mousemove', (event) => {
            mouse.style.left = event.pageX + 'px';
            mouse.style.top = event.pageY + 'px';

            cats.forEach(cat => {
                const catRect = cat.getBoundingClientRect();
                const targetX = event.pageX - 50; // Center the cat
                const targetY = event.pageY - 50;

                const angle = Math.atan2(targetY - catRect.top, targetX - catRect.left);
                cat.style.transform = `translate(${Math.cos(angle) * 10}px, ${Math.sin(angle) * 10}px)`;
            });

            const paw = document.createElement('div');
            paw.className = 'paw';
            paw.style.left = event.pageX + 'px';
            paw.style.top = event.pageY + 'px';
            document.body.appendChild(paw);
            pawPrints.push(paw);

            if (pawPrints.length > 20) {
                const oldPaw = pawPrints.shift();
                oldPaw.remove();
            }

            const meow = new Audio('meow.mp3');
            meow.play();
        });
    </script>
</body>
</html>
